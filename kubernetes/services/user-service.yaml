apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: de013/ecommerce-user-service:s4
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SPRING_PROFILES_ACTIVE
        - name: SPRING_CONFIG_IMPORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SPRING_CONFIG_IMPORT
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/user_service_db"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: SPRING_DATASOURCE_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: REDIS_PORT
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: RABBITMQ_HOST
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USERNAME
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: RABBITMQ_USERNAME
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: RABBITMQ_PASSWORD
        # JWT Configuration
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: JWT_SECRET
        - name: JWT_EXPIRATION
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: JWT_EXPIRATION
        - name: JWT_REFRESH_EXPIRATION
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: JWT_REFRESH_EXPIRATION
        - name: JWT_ISSUER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: JWT_ISSUER
        - name: JWT_ALGORITHM
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: JWT_ALGORITHM
        - name: TOKEN_BLACKLIST_PREFIX
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: TOKEN_BLACKLIST_PREFIX
        # Security Configuration
        - name: PASSWORD_MIN_LENGTH
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: PASSWORD_MIN_LENGTH
        - name: PASSWORD_REQUIRE_UPPERCASE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: PASSWORD_REQUIRE_UPPERCASE
        - name: PASSWORD_REQUIRE_LOWERCASE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: PASSWORD_REQUIRE_LOWERCASE
        - name: PASSWORD_REQUIRE_DIGIT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: PASSWORD_REQUIRE_DIGIT
        - name: PASSWORD_REQUIRE_SPECIAL
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: PASSWORD_REQUIRE_SPECIAL
        - name: RATE_LIMIT_ENABLED
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: RATE_LIMIT_ENABLED
        - name: LOGIN_RATE_LIMIT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: LOGIN_RATE_LIMIT
        - name: REGISTRATION_RATE_LIMIT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: REGISTRATION_RATE_LIMIT
        - name: GENERAL_RATE_LIMIT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: GENERAL_RATE_LIMIT
        - name: SESSION_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SESSION_TIMEOUT
        - name: MAX_CONCURRENT_SESSIONS
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: MAX_CONCURRENT_SESSIONS
        # OpenTelemetry Configuration
        - name: OTEL_SERVICE_NAME
          value: "user-service"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=user-service,service.namespace=ecommerce,deployment.environment=default"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: OTEL_METRICS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: OTEL_METRICS_EXPORTER
        - name: OTEL_LOGS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: OTEL_LOGS_EXPORTER
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          initialDelaySeconds: 90
          periodSeconds: 5
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
