apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: de013/ecommerce-api-gateway:s3
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SPRING_PROFILES_ACTIVE
        - name: SPRING_CONFIG_IMPORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SPRING_CONFIG_IMPORT
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: REDIS_PORT
        - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK-SET-URI
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK-SET-URI
        # Keycloak Configuration
        - name: KEYCLOAK_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: KEYCLOAK_SERVER_URL
        - name: KEYCLOAK_REALM
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: KEYCLOAK_REALM
        - name: KEYCLOAK_ISSUER_URI
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: KEYCLOAK_ISSUER_URI
        - name: KEYCLOAK_JWK_SET_URI
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: KEYCLOAK_JWK_SET_URI
        - name: KEYCLOAK_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: KEYCLOAK_CLIENT_ID
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: KEYCLOAK_CLIENT_SECRET
        - name: KC_BOOTSTRAP_ADMIN_USERNAME
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: KC_BOOTSTRAP_ADMIN_USERNAME
        - name: KC_BOOTSTRAP_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: KC_BOOTSTRAP_ADMIN_PASSWORD
        # JWT Configuration
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: JWT_SECRET
        - name: JWT_ISSUER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: JWT_ISSUER
        - name: TOKEN_BLACKLIST_PREFIX
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: TOKEN_BLACKLIST_PREFIX
        # Redis Database
        - name: REDIS_DATABASE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: REDIS_DATABASE
        # OpenTelemetry Configuration
        - name: OTEL_SERVICE_NAME
          value: "api-gateway"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=api-gateway,service.namespace=ecommerce,deployment.environment=default"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: OTEL_METRICS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: OTEL_METRICS_EXPORTER
        - name: OTEL_LOGS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: OTEL_LOGS_EXPORTER
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 5
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
