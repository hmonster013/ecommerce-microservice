apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: de013/ecommerce-notification-service:s3
        imagePullPolicy: Always
        ports:
        - containerPort: 8086
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SPRING_PROFILES_ACTIVE
        - name: SPRING_CONFIG_IMPORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SPRING_CONFIG_IMPORT
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/notification_service_db"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: SPRING_DATASOURCE_PASSWORD
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: MAIL_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: MAIL_HOST
        - name: MAIL_PORT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: MAIL_PORT
        - name: MAIL_USERNAME
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: MAIL_USERNAME
        - name: MAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: MAIL_PASSWORD
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: TWILIO_ACCOUNT_SID
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: TWILIO_AUTH_TOKEN
        - name: TWILIO_PHONE_NUMBER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: TWILIO_PHONE_NUMBER
        - name: SMS_MOCK_MODE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SMS_MOCK_MODE
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: RABBITMQ_HOST
        - name: RABBITMQ_PORT
          value: "5672"
        - name: RABBITMQ_USERNAME
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: RABBITMQ_USERNAME
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ecommerce-secret
              key: RABBITMQ_PASSWORD
        # Notification Rate Limit & Retry Configuration
        - name: NOTIFICATION_EMAIL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: NOTIFICATION_EMAIL_ENABLED
        - name: NOTIFICATION_SMS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: NOTIFICATION_SMS_ENABLED
        - name: EMAIL_RATE_LIMIT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: EMAIL_RATE_LIMIT
        - name: SMS_RATE_LIMIT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SMS_RATE_LIMIT
        - name: EMAIL_MAX_RETRIES
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: EMAIL_MAX_RETRIES
        - name: SMS_MAX_RETRIES
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SMS_MAX_RETRIES
        - name: EMAIL_RETRY_DELAY_SECONDS
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: EMAIL_RETRY_DELAY_SECONDS
        - name: SMS_RETRY_DELAY_SECONDS
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: SMS_RETRY_DELAY_SECONDS
        # Mail SMTP Configuration
        - name: MAIL_SMTP_AUTH
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: MAIL_SMTP_AUTH
        - name: MAIL_SMTP_STARTTLS_ENABLE
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: MAIL_SMTP_STARTTLS_ENABLE
        - name: MAIL_TEST_CONNECTION
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: MAIL_TEST_CONNECTION
        # OpenTelemetry Configuration
        - name: OTEL_SERVICE_NAME
          value: "notification-service"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=notification-service,service.namespace=ecommerce,deployment.environment=default"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: OTEL_METRICS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: OTEL_METRICS_EXPORTER
        - name: OTEL_LOGS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: ecommerce-configmap
              key: OTEL_LOGS_EXPORTER
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8086
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8086
          initialDelaySeconds: 90
          periodSeconds: 5
          failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8086
      targetPort: 8086
