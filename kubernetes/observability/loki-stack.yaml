# MinIO for Loki storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/loki-data && \
          mkdir -p /data/loki-ruler && \
          minio server /data
        env:
        - name: MINIO_ROOT_USER
          value: "loki"
        - name: MINIO_ROOT_PASSWORD
          value: "supersecret"
        - name: MINIO_PROMETHEUS_AUTH_TYPE
          value: "public"
        - name: MINIO_UPDATE
          value: "off"
        ports:
        - containerPort: 9000
        volumeMounts:
        - name: storage
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: 9000
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  selector:
    app: minio
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
---
# Loki Config
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
data:
  loki.yaml: |
    server:
      http_listen_address: 0.0.0.0
      http_listen_port: 3100

    memberlist:
      join_members:
        - loki-read:7946
        - loki-write:7946
        - loki-backend:7946
      dead_node_reclaim_time: 30s
      gossip_to_dead_nodes_time: 15s
      left_ingesters_timeout: 30s
      bind_addr: ['0.0.0.0']
      bind_port: 7946
      gossip_interval: 2s
      rejoin_interval: 5s

    schema_config:
      configs:
        - from: 2023-01-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h

    common:
      path_prefix: /loki
      replication_factor: 1
      compactor_address: http://loki-backend:3100
      storage:
        s3:
          endpoint: http://minio:9000
          insecure: true
          bucketnames: loki-data
          access_key_id: loki
          secret_access_key: supersecret
          s3forcepathstyle: true
      ring:
        kvstore:
          store: memberlist

    ruler:
      storage:
        s3:
          bucketnames: loki-ruler

    compactor:
      working_directory: /tmp/compactor
---
# Loki Read
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki-read
  labels:
    app: loki-read
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki-read
  template:
    metadata:
      labels:
        app: loki-read
    spec:
      securityContext:
        fsGroup: 0
        runAsUser: 0
      containers:
      - name: loki-read
        image: grafana/loki:latest
        args:
        - '-config.file=/etc/loki/loki.yaml'
        - '-target=read'
        ports:
        - containerPort: 3100
        - containerPort: 7946
        - containerPort: 9095
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        livenessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: loki-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki-read
spec:
  selector:
    app: loki-read
  type: ClusterIP
  ports:
    - name: http
      protocol: TCP
      port: 3100
      targetPort: 3100
    - name: grpc
      protocol: TCP
      port: 9095
      targetPort: 9095
    - name: gossip
      protocol: TCP
      port: 7946
      targetPort: 7946
---
