spring:
  application:
    name: payment-service-test
  
  kafka:
    bootstrap-servers: localhost:59092
    listener:
      missing-topics-fatal: false
  
  # Use H2 in-memory database for testing
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  # Disable Flyway for tests
  flyway:
    enabled: false

  # Disable Spring Cloud Config for tests
  cloud:
    config:
      enabled: false
    openfeign:
      circuitbreaker:
        enabled: true

# Disable Eureka for tests
eureka:
  client:
    enabled: false

# Test-specific logging
logging:
  level:
    org.de013.paymentservice: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: DEBUG
    org.springframework.web: INFO
    org.springframework.test: INFO

# Disable management endpoints for tests
management:
  endpoints:
    enabled-by-default: false
  endpoint:
    health:
      enabled: true

# Mock payment gateway settings
payment:
  gateways:
    stripe:
      enabled: true
      api-key: sk_test_mock_key
      webhook-secret: whsec_mock_secret
      api-version: 2023-10-16
      success-url: http://localhost:3000/payment/success
      cancel-url: http://localhost:3000/payment/cancel
    # Fixed test credentials for VNPay IPN tests (NOT real sandbox creds).
    # Tests sign fake IPN callbacks with this same secret, so the suite is
    # self-contained and independent of the real VNPay account.
    vnpay:
      enabled: true
      tmn-code: TESTTMN
      hash-secret: TESTSECRET
      vnd-rate: 25000
  processing:
    timeout: 30000
    retry-attempts: 1
    retry-delay: 100
  security:
    encryption-key: mock_encryption_key_32_chars_long
    webhook-timeout: 1000

outbox:
  relay:
    enabled: false
