---
# Loki Gateway (nginx)
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-gateway-config
data:
  nginx.conf: |
    user nginx;
    worker_processes 5;

    events {
      worker_connections 1000;
    }

    http {
      resolver kube-dns.kube-system.svc.cluster.local;

      server {
        listen 3100;

        location = / {
          return 200 'OK';
          auth_basic off;
        }

        location = /api/prom/push {
          proxy_pass http://loki-write:3100$request_uri;
        }

        location = /api/prom/tail {
          proxy_pass http://loki-read:3100$request_uri;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
        }

        location ~ /api/prom/.* {
          proxy_pass http://loki-read:3100$request_uri;
        }

        location = /loki/api/v1/push {
          proxy_pass http://loki-write:3100$request_uri;
        }

        location = /loki/api/v1/tail {
          proxy_pass http://loki-read:3100$request_uri;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
        }

        location ~ /loki/api/.* {
          proxy_pass http://loki-read:3100$request_uri;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki-gateway
  labels:
    app: loki-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki-gateway
  template:
    metadata:
      labels:
        app: loki-gateway
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 3100
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        livenessProbe:
          httpGet:
            path: /
            port: 3100
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3100
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: loki-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki-gateway
spec:
  selector:
    app: loki-gateway
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 3100
      targetPort: 3100
